services:

  # ─── Reverse proxy and load balancer ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"            # Only publicly exposed port
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - internal
    restart: unless-stopped

  # ─── Application 1 ───────────────────────────────────────────────────────────
  app1:
    image: nginx:alpine
    container_name: app1
    volumes:
      - ./apps/app1/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - internal
    restart: unless-stopped

  # ─── Application 2 ───────────────────────────────────────────────────────────
  app2:
    image: nginx:alpine
    container_name: app2
    volumes:
      - ./apps/app2/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - internal
    restart: unless-stopped

  # ─── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB:       appdb
      POSTGRES_USER:     appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

# ─── Internal network ──────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data: