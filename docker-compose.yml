services:

  # ─── Reverse proxy and load balancer ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"            # Only publicly exposed port
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - internal
    restart: unless-stopped

  # ─── Application 1 ───────────────────────────────────────────────────────────
  app1:
    build: ./apps/app1
    container_name: app1
    environment:
      PORT: 80
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: supersecretpassword
      DB_NAME: livrosdb
      JWT_SECRET: dev-secret-key-123
      SEED_USER_EMAIL: admin@admin.com
      SEED_USER_PASSWORD: adminpassword
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ─── Application 2 ───────────────────────────────────────────────────────────
  app2:
    build: ./apps/app2
    container_name: app2
    environment:
      PORT: 80
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: supersecretpassword
      DB_NAME: livrosdb
      JWT_SECRET: dev-secret-key-123
      SEED_USER_EMAIL: admin@admin.com
      SEED_USER_PASSWORD: adminpassword
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ─── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: livrosdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d livrosdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

# ─── Internal network ──────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge